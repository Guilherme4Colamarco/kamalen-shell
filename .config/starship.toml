"$schema" = 'https://starship.rs/config-schema.json'

format = """
[ $os ](bg:color1 fg:color_bg)\
$username\
$hostname\
[ΌΓ░](bg:color2 fg:color1)\
$directory\
[ΌΓ░](bg:color3 fg:color2)\
$git_branch\
$git_status\
[ΌΓ░](bg:color4 fg:color3)\
$c\
$rust\
$golang\
$nodejs\
$php\
$java\
$kotlin\
$haskell\
$python\
$cmd_duration\
[ΌΓ░](fg:color4)\
$character"""

palette = 'iris'

[palettes.iris]
color_bg = '#222020'
color1 = '#9ba7bf'
color2 = '#343232'
color3 = '#6b6969'
color4 = '#e1e0e0'
text_light = '#e1e0e0'
text_dark = '#222020'

[os]
disabled = false
style = "bg:color1 fg:color_bg"

[os.symbols]
# Distros pedidas
CachyOS = "ΎΝΔ"        # n├μo tem icon dedicado, usa o Arch
Gentoo = "ΎΝΞ"
NixOS = "ΎΝΥ"
Void = "ΎΝχ"
Zorin = "ΎΝψ"
Mint = "ΎΝΟ"
Garuda = "ΎΝ╖"
Nobara = "ΎΟΑ"

# Populares entre ricers
Arch = "ΎΝΔ"
Artix = "ΎΝθ"
EndeavourOS = "ΎΝλ"
Manjaro = "ΎΝΤ"
Pop = "ΎΝς"
openSUSE = "ΎΝΦ"
Solus = "ΎΝφ"
Alpine = "ΎΝΑ"
FreeBSD = "ΎΝΝ"
Redhat = "ΎΝΨ"
RockyLinux = "ΎΝτ"
AlmaLinux = "ΎΝζ"
Kali = "ΎΝπ"
Fedora = "ΎΝΛ"
Debian = "ΎΝΗ"
Ubuntu = "ΎΝδ"

# B├┤nus έΑΦ outras comuns
CentOS = "ΎΝΕ"
Elementary = "ΎΝΚ"
SUSE = "ΎΝγ"

# Fallback (Unknown)
Unknown = "ΎΝγ"        # Tux gen├σrico pra distros sem icon

[username]
show_always = true
style_user = "bg:color1 fg:color_bg"
style_root = "bg:color1 fg:color_bg"
format = '[$user]($style)'

[hostname]
ssh_only = true
style = "bg:color1 fg:color_bg"
format = '[@$hostname ]($style)'

[directory]
style = "bg:color2 fg:text_light"
format = "[ ΎΒ╗ $path ]($style)"
truncation_length = 3
truncation_symbol = "έΑο/"

[directory.substitutions]
"Documents" = "≤░Ιβ "
"Downloads" = "ΎΑβ "
"Music" = "ΎΑΒ "
"Pictures" = "ΎΑ╛ "

[git_branch]
symbol = "ΎΡα"
style = "bg:color3 fg:text_light"
format = '[ $symbol $branch ]($style)'

[git_status]
style = "bg:color3 fg:text_light"
format = '[$all_status$ahead_behind ]($style)'

[python]
symbol = "Όε╝"
style = "bg:color4 fg:color_bg"
format = '[ $symbol $version ]($style)'

[nodejs]
symbol = "Όεα"
style = "bg:color4 fg:color_bg"
format = '[ $symbol $version ]($style)'

[rust]
symbol = "Όηρ"
style = "bg:color4 fg:color_bg"
format = '[ $symbol $version ]($style)'

[golang]
symbol = "Όαπ"
style = "bg:color4 fg:color_bg"
format = '[ $symbol $version ]($style)'

[c]
symbol = "Όαη"
style = "bg:color4 fg:color_bg"
format = '[ $symbol $version ]($style)'

[cmd_duration]
style = "bg:color4 fg:color_bg"
format = '[ ΎΡ║ $duration ]($style)'

[character]
success_symbol = "[ ](#a6e3a1)"
error_symbol = "[έεΩ ](#f38ba8)"
vicmd_symbol = "[Όατ ](#f9e2af)"
