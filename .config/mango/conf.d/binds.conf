
#Binds
bind=SUPER,Return,spawn,kitty
bind=SUPER+SHIFT,Return,spawn,kitty --class floatterm
bind=SUPER,d,spawn,touch /tmp/qs-launcher-toggle
bind=SUPER,a,spawn,touch /tmp/qs-dashboard-toggle
bind=SUPER,comma,spawn,touch /tmp/qs-settings-toggle
bind=SUPER,w,spawn,touch /tmp/qs-wallpaper-toggle
bind=SUPER+SHIFT,m,spawn,touch /tmp/qs-media-toggle
bind=SUPER+SHIFT,slash,spawn,touch /tmp/qs-shortcuts-toggle
bind=SUPER+SHIFT,w,spawn,~/.config/scripts/random-wallpaper.sh
bind=SUPER,e,spawn,thunar
bind=SUPER,q,killclient
bind=SUPER+SHIFT,space,togglefloating
bind=SUPER,f,togglefullscreen
bind=SUPER,x,spawn,touch ~/.cache/qs/lock
bind=SUPER+SHIFT,e,spawn_shell,echo > /tmp/qs-power-menu
bind=SUPER+CTRL,space,spawn_shell,echo > /tmp/qs-layout-menu
bind=SUPER+ALT,r,spawn_shell,bash ~/.config/mango-ext/toggle_scale.sh

bind=SUPER,Left,focusdir,left
bind=SUPER,Down,focusdir,down
bind=SUPER,Up,focusdir,up
bind=SUPER,Right,focusdir,right
bind=SUPER,h,focusdir,left
bind=SUPER,j,focusdir,down
bind=SUPER,k,focusdir,up
bind=SUPER,l,focusdir,right
bind=SUPER,Tab,focusstack,next
bind=SUPER+SHIFT,Tab,focusstack,prev

bind=SUPER+SHIFT,Left,exchange_client,left
bind=SUPER+SHIFT,Down,exchange_client,down
bind=SUPER+SHIFT,Up,exchange_client,up
bind=SUPER+SHIFT,Right,exchange_client,right
bind=SUPER+SHIFT,h,exchange_client,left
bind=SUPER+SHIFT,j,exchange_client,down
bind=SUPER+SHIFT,k,exchange_client,up
bind=SUPER+SHIFT,l,exchange_client,right

bind=SUPER+CTRL,Left,resizewin,-20,0
bind=SUPER+CTRL,Right,resizewin,20,0
bind=SUPER+CTRL,Up,resizewin,0,-20
bind=SUPER+CTRL,Down,resizewin,0,20
bind=SUPER+CTRL,h,resizewin,-20,0
bind=SUPER+CTRL,l,resizewin,20,0
bind=SUPER+CTRL,k,resizewin,0,-20
bind=SUPER+CTRL,j,resizewin,0,20

bind=SUPER,1,view,1
bind=SUPER,2,view,2
bind=SUPER,3,view,3
bind=SUPER,4,view,4
bind=SUPER,5,view,5
bind=SUPER+SHIFT,1,tag,1
bind=SUPER+SHIFT,2,tag,2
bind=SUPER+SHIFT,3,tag,3
bind=SUPER+SHIFT,4,tag,4
bind=SUPER+SHIFT,5,tag,5

gesturebind=none,left,3,viewtoleft_have_client
gesturebind=none,right,3,viewtoright_have_client
gesturebind=none,up,3,toggleoverview
gesturebind=none,down,3,toggleoverview

bind=SUPER,space,switch_layout
bind=SUPER,t,setlayout,tile
bind=SUPER+SHIFT,t,setlayout,monocle
bind=SUPER,c,setlayout,center_tile
bind=SUPER,s,setlayout,scroller
bind=SUPER,v,spawn_shell,echo > /tmp/qs-clipboard-toggle
bind=SUPER+SHIFT,v,setoption,tag_animation_direction,1
bind=SUPER,o,toggleoverview
bind=SUPER,g,togglegaps
bind=SUPER+SHIFT,g,toggleglobal
bind=SUPER,bracketleft,setmfact,-0.05
bind=SUPER,bracketright,setmfact,+0.05
bind=SUPER+SHIFT,s,switch_proportion_preset

# NOTE: unsupported dispatches by the installed MangoWM build, kept disabled.
